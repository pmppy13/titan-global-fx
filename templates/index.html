{% extends 'base.html' %}
{% load static %}

{% block title %}Titan Global FX | Premium Forex & Trading{% endblock %}

{% block extra_css %}
<style>
    /* ===== HERO ===== */
    .hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        position: relative;
        overflow: hidden;
        padding-top: 80px;
        background: var(--navy);
    }
    .hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse 80% 60% at 20% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 70%),
            radial-gradient(ellipse 60% 50% at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 60%),
            radial-gradient(ellipse 100% 80% at 50% 50%, rgba(10, 15, 31, 0.95) 0%, var(--navy) 100%);
        z-index: 1;
    }
    .hero-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.2;
        animation: orbFloat 12s ease-in-out infinite alternate;
        z-index: 0;
    }
    .hero-orb.orb1 {
        width: 400px;
        height: 400px;
        background: var(--gold);
        top: -10%;
        right: -5%;
        animation-delay: 0s;
    }
    .hero-orb.orb2 {
        width: 300px;
        height: 300px;
        background: #d4af37;
        bottom: -10%;
        left: -5%;
        animation-delay: -4s;
        opacity: 0.1;
    }
    @keyframes orbFloat {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(40px, -30px) scale(1.1); }
    }
    .hero-bg-grid {
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 60px 60px;
        z-index: 0;
        animation: gridPulse 10s ease-in-out infinite alternate;
    }
    @keyframes gridPulse {
        0% { opacity: 0.3; }
        100% { opacity: 0.8; }
    }
    .hero .container {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        align-items: center;
        padding-top: 40px;
        padding-bottom: 40px;
    }
    .hero-content h1 {
        font-size: 3.8rem;
        font-weight: 800;
        line-height: 1.08;
        letter-spacing: -0.04em;
        margin-bottom: 20px;
    }
    .hero-content h1 .gold {
        background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .hero-content p {
        font-size: 1.2rem;
        color: var(--gray-400);
        max-width: 480px;
        line-height: 1.8;
        margin-bottom: 32px;
    }
    .hero-buttons {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
    }
    .hero-stats {
        display: flex;
        gap: 48px;
        margin-top: 48px;
        padding-top: 32px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .hero-stats .stat h3 {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--gold);
        text-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
    }
    .hero-stats .stat p {
        font-size: 0.85rem;
        color: var(--gray-500);
        margin: 0;
    }
    .hero-chart-card {
        background: rgba(17, 27, 47, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: var(--radius-lg);
        padding: 24px 28px;
        width: 100%;
        max-width: 580px;
        box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        transition: var(--transition);
        position: relative;
        overflow: hidden;
    }
    .hero-chart-card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.03), transparent 60%);
        pointer-events: none;
    }
    .hero-chart-card:hover {
        border-color: rgba(212, 175, 55, 0.15);
        box-shadow: var(--shadow-lg), 0 0 60px rgba(212, 175, 55, 0.04);
    }
    .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
    }
    .chart-header-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    .chart-header-left .pair {
        font-size: 1rem;
        font-weight: 500;
        color: var(--gray-300);
    }
    .chart-header-left .pair .flag {
        margin-right: 6px;
    }
    .chart-price-section {
        display: flex;
        align-items: baseline;
        gap: 12px;
    }
    .chart-price-section .price {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--white);
        letter-spacing: -0.02em;
    }
    .chart-price-section .change {

        font-size: 0.85rem;

        border-radius: 50px;
    }
    .chart-price-section .change.up {
        color: var(--green);
        background: rgba(0, 200, 151, 0.1);
    }
    .chart-price-section .change.down {
        color: var(--red);
        background: rgba(255, 107, 107, 0.1);
    }
    .chart-header-right {
        text-align: right;
    }
    .chart-header-right .label {
        font-size: 0.65rem;
        color: var(--gray-500);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .chart-header-right .value {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--gray-300);
    }
    .chart-area {
        position: relative;
        margin: 8px 0 12px;
        height: 180px;
    }
    .chart-canvas-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }
    .chart-canvas-wrapper canvas {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 4px;
    }
    .chart-glow-line {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        overflow: hidden;
    }
    .chart-glow-line::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        opacity: 0.3;
        animation: glowSweep 3s ease-in-out infinite;
    }
    @keyframes glowSweep {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }
    .chart-timeframes {
        display: flex;
        gap: 8px;
        margin-top: 8px;
    }
    .chart-timeframes button {
        padding: 3px 12px;
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--gray-500);
        border-radius: 4px;
        transition: var(--transition);
        background: transparent;
        border: 1px solid transparent;
    }
    .chart-timeframes button:hover {
        color: var(--gray-300);
    }
    .chart-timeframes button.active {
        color: var(--gold);
        border-color: rgba(212, 175, 55, 0.2);
        background: rgba(212, 175, 55, 0.06);
    }
    .chart-indicators {
        display: flex;
        justify-content: space-between;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        flex-wrap: wrap;
        gap: 8px;
    }
    .chart-indicators .indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        color: var(--gray-400);
    }
    .chart-indicators .indicator .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
    }
    .chart-indicators .indicator .dot.green {
        background: var(--green);
    }
    .chart-indicators .indicator .dot.red {
        background: var(--red);
    }
    .chart-indicators .indicator .dot.gold {
        background: var(--gold);
    }
    .chart-indicators .indicator .ind-value {
        font-weight: 600;
        color: var(--gray-300);
    }
    .trade-feed {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
    }
    .trade-feed .trade-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.7rem;
        color: var(--gray-400);
        animation: tradePulse 2s ease-in-out infinite;
    }
    .trade-feed .trade-item .trade-amount {
        font-weight: 600;
        color: var(--green);
    }
    .trade-feed .trade-item .trade-amount.sell {
        color: var(--red);
    }
    @keyframes tradePulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
    }

    /* ===== TICKER ===== */
    .ticker {
        background: rgba(17, 27, 47, 0.5);
        backdrop-filter: blur(4px);
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        padding: 12px 0;
        overflow: hidden;
        position: relative;
        z-index: 2;
    }
    .ticker-track {
        display: flex;
        animation: tickerScroll 30s linear infinite;
        width: max-content;
    }
    .ticker-track .ticker-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 32px;
        font-size: 0.85rem;
        white-space: nowrap;
    }
    .ticker-track .ticker-item .symbol {
        font-weight: 600;
        color: var(--white);
    }
    .ticker-track .ticker-item .price {
        color: var(--gray-300);
    }
    .ticker-track .ticker-item .change {
        font-weight: 600;
    }
    .ticker-track .ticker-item .change.up {
        color: #4caf50;
    }
    .ticker-track .ticker-item .change.down {
        color: #ef5350;
    }
    @keyframes tickerScroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }

    /* ===== SECTIONS ===== */
    .section { padding: 80px 0; opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .section.is-visible { opacity: 1; transform: translateY(0); }
    .section-title {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.15;
        margin-bottom: 16px;
    }
    .section-title .highlight {
        background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        position: relative;
    }
    .section-title .highlight::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        opacity: 0.3;
        transform: scaleX(0);
        transition: transform 0.6s ease;
    }
    .section.is-visible .section-title .highlight::after { transform: scaleX(1); }
    .section-subtitle {
        font-size: 1.1rem;
        color: var(--gray-400);
        max-width: 600px;
        line-height: 1.7;
    }
    .text-center { text-align: center; }
    .mx-auto { margin-left: auto; margin-right: auto; }

    /* ===== WHY CHOOSE US ===== */

    .why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 16px; }
    .why-grid .why-card {
        background: rgba(255, 255, 255, 0.02);

        transition: var(--transition);
        backdrop-filter: blur(4px);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    .why-grid .why-card:hover {
        background: rgba(255, 255, 255, 0.05);
        transform: translateY(-6px);
        border-color: rgba(212, 175, 55, 0.2);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(212, 175, 55, 0.03);
    }
    .why-grid .why-card .icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: rgba(212, 175, 55, 0.08);
        display: flex;

        transition: var(--transition);
    }
    .why-grid .why-card:hover .icon { background: rgba(212, 175, 55, 0.15); transform: scale(1.05); }

    .why-grid .why-card p { color: var(--gray-400); font-size: 0.95rem; line-height: 1.7; }

    /* ===== STATS ===== */
    .stats-section {
        background: var(--navy);
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

        display: grid;

        gap: 32px;

    }
    .stats-grid .stat-item h2 {
        font-size: 3rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--gold-light), var(--gold-dark));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
    }
    .stats-grid .stat-item p { color: var(--gray-400); font-size: 0.95rem; margin-top: 4px; }

    /* ===== PLANS ===== */
    .plans-section {
        background: var(--navy-light);
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .plans-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
        margin-top: 16px;
    }
    .plan-card {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);

        padding: 28px 22px 24px;

        position: relative;
        overflow: hidden;
    }
    .plan-card:hover {
        border-color: rgba(212, 175, 55, 0.2);
        transform: translateY(-6px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(212, 175, 55, 0.02);
        background: rgba(255, 255, 255, 0.04);
    }
    .plan-card .plan-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        font-size: 0.6rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 3px 12px;
        border-radius: 50px;
        background: rgba(212, 175, 55, 0.08);
        color: var(--gold);
        border: 1px solid rgba(212, 175, 55, 0.04);
    }
    .plan-card .plan-badge.popular {
        background: rgba(212, 175, 55, 0.15);
        color: var(--gold-light);
        border-color: rgba(212, 175, 55, 0.15);
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.05);
    }
    .plan-card .plan-icon { font-size: 2.4rem; margin-bottom: 8px; display: block; }
    .plan-card .plan-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 2px; }
    .plan-card .plan-sub { font-size: 0.8rem; color: var(--gray-500); margin-bottom: 12px; }
    .plan-card .plan-price {
        font-size: 2.6rem;
        font-weight: 800;
        color: var(--gold);
        letter-spacing: -0.02em;
        margin-bottom: 2px;
    }
