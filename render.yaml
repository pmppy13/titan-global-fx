services:
  - type: web
    name: titan-global-fx
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
    startCommand: gunicorn titan_fx.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "True"
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: DATABASE_URL
        fromDatabase:
          name: titan-fx-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DISABLE_COLLECTSTATIC
        value: "0"
    databases:
      - name: titan-fx-db
        plan: free
